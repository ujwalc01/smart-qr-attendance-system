spring.application.name=qr-smart-attendance-system

# Local MySQL setup:
# CREATE DATABASE qr_attendance_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/qr_attendance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MVP-local schema management. Do not use ddl-auto=update for production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Set a strong local secret before running:
# macOS/Linux: export JWT_SECRET='replace-with-at-least-32-random-characters'
# PowerShell:   $env:JWT_SECRET='replace-with-at-least-32-random-characters'
app.jwt.secret=${JWT_SECRET:local-dev-only-change-this-secret-32chars-minimum}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:30}
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.qr.expiration-minutes=${QR_EXPIRATION_MINUTES:5}

server.error.include-message=never
server.error.include-binding-errors=never
